services:
  jetbra-next:
    build:
      context: .
      dockerfile: Dockerfile
    image: jetbra-next:latest
    container_name: jetbra-next
    restart: unless-stopped

    ports:
      - "3088:3088"

    environment:
      NODE_ENV: production
      PORT: 3088
      HOSTNAME: 0.0.0.0

    volumes:
      - ./cert:/app/cert:ro

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3088/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    security_opt:
      - no-new-privileges:true